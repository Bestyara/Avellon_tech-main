stages:
  - build
  - test

default:
  image: python:3.12
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - .cache/pip
      - venv/
  before_script:
    - chmod +x scripts/init_macos.sh
    - ./scripts/init_macos.sh

build_project:
  stage: build
  script:
    - . venv/bin/activate
    - python -m compileall -q .

run_tests:
  stage: test
  script:
    - . venv/bin/activate
    - python -m unittest discover -v

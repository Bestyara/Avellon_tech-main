# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        chmod +x scripts/init_macos.sh
        ./scripts/init_macos.sh
    - name: Build project
      run: |
        venv/bin/python -m compileall -q .

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        chmod +x scripts/init_macos.sh
        ./scripts/init_macos.sh
        venv/bin/python -m pip install flake8
    - name: Run linter
      run: |
        # stop the build if there are Python syntax errors or undefined names
        venv/bin/python -m flake8 . --exclude=.git,__pycache__,venv,.venv,.github --count --select=E9,F63,F7,F82 --show-source --statistics
        # keep style issues informational
        venv/bin/python -m flake8 . --exclude=.git,__pycache__,venv,.venv,.github --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
